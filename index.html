<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Sassy Voice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app">

    <!-- MENU PAGE -->
    <section id="menuPage" class="page active">
      <div class="container menu">
        <h1>🎵 My Sassy Voice</h1>
        <p class="subtitle">Welcome to My Sassy Voice Music Player</p>

        <div class="menu-buttons">
          <button type="button" id="playlistButton">📂 Playlist</button>
          <button type="button" id="nowPlayingButton">🎧 Now Playing</button>
        </div>
      </div>
    </section>

    <!-- PLAYLIST PAGE -->
    <section id="playlistPage" class="page">
      <div class="container">
        <button type="button" id="backMenuBtn" class="link-button">← Menu</button>

        <h1> My Sassy Voice Playlist</h1>
        <p class="subtitle">Choose one playlist</p>

        <div id="playlistMenu" class="playlist-menu">
          <button type="button" class="playlist-card" data-playlist="prayer">
            <h2>🙏 Prayer Playlist</h2>
            <p>Prayer and worship songs</p>
          </button>

          <button type="button" class="playlist-card" data-playlist="scott">
            <h2>🎹 Scott Joplin Playlist</h2>
            <p>Scott Joplin Collection</p>
          </button>
        </div>

        <div id="playlistSongs" style="display: none;">
          <button type="button" id="backPlaylistBtn" class="link-button">← All Playlists</button>
          <h2 id="playlistTitle"></h2>
          <div id="playlist"></div>
        </div>
      </div>
    </section>

    <!-- PLAYER PAGE -->
    <section id="playerPage" class="page">
      <div class="container">
        <button type="button" id="backToPlaylistBtn" class="link-button">← Playlist</button>

        <section class="player">
          <img id="albumArt" class="cover" src="" alt="Album Art">

          <h2 id="title">No song selected</h2>
          <p id="artist"></p>

          <input type="range" id="progress" value="0" min="0" max="0">

          <div class="time">
            <span id="currentTime">00:00</span>
            <span id="duration">00:00</span>
          </div>

          <div class="controls">
            <button type="button" id="prevBtn">⏮</button>
            <button type="button" id="playBtn">▶</button>
            <button type="button" id="nextBtn">⏭</button>
          </div>

          <div class="controls">
            <button type="button" id="shuffleBtn">🔀</button>
            <button type="button" id="repeatBtn">🔁</button>
            <button type="button" id="stopBtn">⏹</button>
          </div>
        </section>
      </div>
    </section>

  </main>

  <!-- MINI PLAYER -->
  <div id="miniPlayer" class="mini-player">
    <div class="mini-info">
      <strong id="miniTitle"></strong>
      <span id="miniArtist"></span>
    </div>

    <div class="mini-controls">
      <button type="button" id="miniPlayBtn">▶</button>
      <button type="button" id="miniNowPlayingBtn">Now Playing</button>
    </div>
  </div>

  <audio id="audio"></audio>

  <script src="script.js" defer></script>
</body>
</html>
